<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 Grocery Game - Learning Fun!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            max-width: 500px;
        }
        h1 { color: #2d3436; font-size: 2.8em; margin-bottom: 10px; }
        .subtitle { color: #636e72; font-size: 1.2em; margin-bottom: 40px; }
        .emoji { font-size: 4em; margin-bottom: 20px; display: block; }
        .play-btn {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.5em;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 184, 148, 0.4);
        }
        .tagline { margin-top: 30px; color: #b2bec3; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <span class="emoji">🛒</span>
        <h1>Grocery Game</h1>
        <p class="subtitle">Learn to shop smart!</p>
        <a href="grocery_game.html" class="play-btn">Start Game 🎮</a>
        <p class="tagline">For kids ages 3-5</p>
    </div>
</body>
</html>
